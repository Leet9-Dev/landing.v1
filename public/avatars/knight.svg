  <!-- Eye slits -->
  <rect x="74" y="89" width="20" height="5" rx="2" fill="#C8FF00" opacity="0.7"/>
  <rect x="106" y="89" width="20" height="5" rx="2" fill="#C8FF00" opacity="0.7"/>
  <!-- Helmet ridge -->
