  <ellipse cx="114" cy="92" rx="6" ry="5.5" fill="#7FFF00" opacity="0.5"/>
  <!-- Exposed teeth grin -->
  <path d="M76 112 Q100 122 124 112" fill="none" stroke="#4A7C59" stroke-width="1"/>
  <rect x="79" y="112" width="42" height="12" rx="2" fill="#1C2B1A" stroke="#3D6B36" stroke-width="1"/>
  <rect x="82" y="113" width="7" height="9" rx="1" fill="#E5E7EB" opacity="0.9"/>
  <rect x="92" y="113" width="7" height="9" rx="1" fill="#E5E7EB" opacity="0.9"/>
  <rect x="102" y="113" width="7" height="9" rx="1" fill="#E5E7EB" opacity="0.9"/>
  <rect x="112" y="113" width="7" height="9" rx="1" fill="#E5E7EB" opacity="0.7"/>
