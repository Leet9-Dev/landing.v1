  <path d="M64 85 Q60 62 70 52" stroke="#1C2B1A" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M78 72 Q72 52 82 44" stroke="#1C2B1A" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M100 68 Q98 50 104 42" stroke="#1C2B1A" stroke-width="4" fill="none" stroke-linecap="round"/>
