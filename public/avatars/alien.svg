<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="#0D0F1A"/>
  <!-- Body/suit -->
  <path d="M42 200 Q42 156 68 146 Q84 138 100 136 Q116 138 132 146 Q158 156 158 200 Z" fill="#134E4A"/>
  <path d="M50 200 Q50 160 74 150 Q88 143 100 141 Q112 143 126 150 Q150 160 150 200 Z" fill="#0F766E" stroke="#14B8A6" stroke-width="1"/>
  <!-- Neck -->
  <rect x="90" y="122" width="20" height="18" rx="3" fill="#0F766E"/>
  <!-- Alien head - big and egg shaped -->
  <ellipse cx="100" cy="88" rx="48" ry="55" fill="#134E4A" stroke="#14B8A6" stroke-width="2"/>
  <!-- Big black eyes -->
  <ellipse cx="80" cy="85" rx="18" ry="22" fill="#0D0F1A"/>
  <ellipse cx="120" cy="85" rx="18" ry="22" fill="#0D0F1A"/>
  <!-- Eye shine -->
  <ellipse cx="80" cy="85" rx="12" ry="15" fill="#14B8A6" opacity="0.3"/>
  <ellipse cx="120" cy="85" rx="12" ry="15" fill="#14B8A6" opacity="0.3"/>
  <circle cx="74" cy="78" r="5" fill="#5EEAD4" opacity="0.7"/>
  <circle cx="114" cy="78" r="5" fill="#5EEAD4" opacity="0.7"/>
  <!-- Tiny nose slits -->
  <ellipse cx="96" cy="110" rx="3" ry="2" fill="#14B8A6" opacity="0.5"/>
  <ellipse cx="104" cy="110" rx="3" ry="2" fill="#14B8A6" opacity="0.5"/>
  <!-- Small mouth -->
  <path d="M88 120 Q100 126 112 120" fill="none" stroke="#14B8A6" stroke-width="2" stroke-linecap="round"/>
  <!-- Head markings -->
  <path d="M100 38 Q106 50 100 58 Q94 50 100 38 Z" fill="#14B8A6" opacity="0.4"/>
</svg>
