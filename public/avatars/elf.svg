  <!-- Elvish headband -->
  <path d="M66 76 Q100 68 134 76" fill="none" stroke="#22C55E" stroke-width="3" stroke-linecap="round"/>
  <circle cx="100" cy="70" r="5" fill="#22C55E"/>
  <!-- Eyes - almond shaped -->
  <ellipse cx="86" cy="92" rx="10" ry="7" fill="#1C1917"/>
  <ellipse cx="114" cy="92" rx="10" ry="7" fill="#1C1917"/>
  <ellipse cx="86" cy="92" rx="6" ry="4" fill="#22C55E"/>
  <ellipse cx="114" cy="92" rx="6" ry="4" fill="#22C55E"/>
  <circle cx="84" cy="90" r="1.5" fill="#fff" opacity="0.7"/>
  <circle cx="112" cy="90" r="1.5" fill="#fff" opacity="0.7"/>
