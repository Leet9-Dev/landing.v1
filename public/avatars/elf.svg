  <path d="M98 105 L100 110 L102 105" fill="none" stroke="#D97706" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M88 116 Q100 122 112 116" fill="none" stroke="#D97706" stroke-width="2" stroke-linecap="round"/>
